version: '3.8'

# Docker Swarm Stack – para producción con orquestación
# Deploy con: docker stack deploy -c swarm-stack.yml devops

services:
  app:
    image: ${DOCKER_IMAGE:-tu-usuario/devops-demo-app}:${APP_VERSION:-latest}
    environment:
      - ENVIRONMENT=production
      - APP_VERSION=${APP_VERSION:-1.0.0}
    networks:
      - app_overlay
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    networks:
      - app_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=devopsdb
      - POSTGRES_USER=devopsuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

configs:
  nginx_config:
    file: ./nginx/nginx.conf

secrets:
  db_password:
    external: true

networks:
  app_overlay:
    driver: overlay
    attachable: true

volumes:
  db_data:
    driver: local
