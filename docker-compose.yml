version: '3.8'

services:
  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-devops-demo-app}:${APP_VERSION:-latest}
    container_name: devops_app
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - APP_VERSION=${APP_VERSION:-1.0.0}
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Nginx Load Balancer ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devops_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: devops_db
    environment:
      - POSTGRES_DB=${DB_NAME:-devopsdb}
      - POSTGRES_USER=${DB_USER:-devopsuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devopsuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  db_data:
    driver: local
